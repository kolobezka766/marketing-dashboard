<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            zinc: { 950: '#09090b' }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/papaparse@5/papaparse.min.js"></script>
  <style>
    body { background: #09090b; color: #f4f4f5; font-family: ui-sans-serif, system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #18181b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    .fade-in { animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .bar-fill { transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  </style>
</head>
<body class="dark">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── Mock data ────────────────────────────────────────────────────────────────
const MOCK_ROWS = [
  { client:"Pizzeria Roma",       channel:"meta",   ad_name:"Rozvoz pizzy Praha 7 – video",    impressions:42000, clicks:1890, leads:134, purchases:89, spend:4200, daily_budget:600 },
  { client:"Pizzeria Roma",       channel:"meta",   ad_name:"Rozvoz pizzy Praha 7 – statika",  impressions:18000, clicks:612,  leads:41,  purchases:29, spend:1800, daily_budget:300 },
  { client:"Pizzeria Roma",       channel:"google", ad_name:"Pizza delivery Praha – search",   impressions:12400, clicks:868,  leads:78,  purchases:61, spend:2600, daily_budget:400 },
  { client:"Pizzeria Roma",       channel:"google", ad_name:"Pizza Roma brand",                impressions:6100,  clicks:242,  leads:20,  purchases:15, spend:500,  daily_budget:100 },
  { client:"Pizzeria Roma",       channel:"tiktok", ad_name:"Pizza challenge #roma",           impressions:95000, clicks:2280, leads:42,  purchases:18, spend:1800, daily_budget:250 },
  { client:"AutoServis Novák",    channel:"google", ad_name:"Pneuservis Praha – levně",        impressions:12400, clicks:248,  leads:31,  purchases:28, spend:2900, daily_budget:450 },
  { client:"AutoServis Novák",    channel:"google", ad_name:"Servis auta Praha",               impressions:7800,  clicks:140,  leads:18,  purchases:16, spend:1600, daily_budget:250 },
  { client:"AutoServis Novák",    channel:"meta",   ad_name:"Zimní přezutí – akce",            impressions:28000, clicks:364,  leads:18,  purchases:14, spend:1500, daily_budget:200 },
  { client:"Fit Eshop",           channel:"meta",   ad_name:"Proteiny akce 2024 – video",      impressions:65000, clicks:455,  leads:12,  purchases:8,  spend:5800, daily_budget:850 },
  { client:"Fit Eshop",           channel:"meta",   ad_name:"Proteiny akce 2024 – statika",    impressions:22000, clicks:110,  leads:3,   purchases:2,  spend:1900, daily_budget:280 },
  { client:"Fit Eshop",           channel:"google", ad_name:"Doplňky stravy – search",         impressions:22000, clicks:220,  leads:9,   purchases:5,  spend:3200, daily_budget:480 },
  { client:"Fit Eshop",           channel:"tiktok", ad_name:"Workout motivation #fitlife",     impressions:110000,clicks:880,  leads:6,   purchases:3,  spend:2100, daily_budget:300 },
  { client:"Beauty Studio Lenka", channel:"meta",   ad_name:"Permanentní make-up slevy",       impressions:31000, clicks:1550, leads:87,  purchases:0,  spend:2800, daily_budget:400 },
  { client:"Beauty Studio Lenka", channel:"meta",   ad_name:"Microblading – before/after",     impressions:19000, clicks:1140, leads:63,  purchases:0,  spend:1700, daily_budget:250 },
  { client:"Beauty Studio Lenka", channel:"tiktok", ad_name:"Transformation video",            impressions:88000, clicks:3520, leads:124, purchases:0,  spend:1900, daily_budget:280 },
  { client:"Realitka Brno",       channel:"google", ad_name:"Byty Brno na prodej",             impressions:9800,  clicks:196,  leads:4,   purchases:2,  spend:6200, daily_budget:900 },
  { client:"Realitka Brno",       channel:"google", ad_name:"Pronájem bytu Brno",              impressions:5200,  clicks:78,   leads:2,   purchases:1,  spend:2800, daily_budget:400 },
  { client:"Realitka Brno",       channel:"meta",   ad_name:"Investiční byty 2024 – video",    impressions:41000, clicks:492,  leads:7,   purchases:3,  spend:4800, daily_budget:700 },
  { client:"Kavárna Moment",      channel:"meta",   ad_name:"Ranní káva + breakfast",          impressions:22000, clicks:1320, leads:98,  purchases:0,  spend:1100, daily_budget:160 },
  { client:"Kavárna Moment",      channel:"tiktok", ad_name:"Latte art video",                 impressions:54000, clicks:2700, leads:156, purchases:0,  spend:800,  daily_budget:115 },
  { client:"Kavárna Moment",      channel:"tiktok", ad_name:"Barista challenge",               impressions:38000, clicks:1520, leads:89,  purchases:0,  spend:560,  daily_budget:80  },
];

const THRESHOLDS = { minCTR: 1.5, maxCPL: 150, maxCPP: 800 };

const CH = {
  google: { label:"Google", ring:"ring-blue-500/40",   bg:"bg-blue-500/15",   text:"text-blue-400",   border:"border-blue-500/30",  bar:"#3b82f6" },
  meta:   { label:"Meta",   ring:"ring-indigo-500/40", bg:"bg-indigo-500/15", text:"text-indigo-400", border:"border-indigo-500/30", bar:"#818cf8" },
  tiktok: { label:"TikTok", ring:"ring-pink-500/40",   bg:"bg-pink-500/15",   text:"text-pink-400",   border:"border-pink-500/30",   bar:"#f472b6" },
};

// ─── Utils ────────────────────────────────────────────────────────────────────
function n(v, dec=1) {
  return Number(v).toLocaleString("cs-CZ",{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function kc(v) {
  if (!v || v === 0) return "—";
  return Number(v).toLocaleString("cs-CZ",{maximumFractionDigits:0}) + " Kč";
}
function spend(v) {
  return Number(v).toLocaleString("cs-CZ",{maximumFractionDigits:0}) + " Kč";
}
function clr(status) {
  return status==="good" ? "text-emerald-400" : status==="warning" ? "text-amber-400" : "text-red-400";
}
function dot(status) {
  return status==="good" ? "bg-emerald-400" : status==="warning" ? "bg-amber-400" : "bg-red-500";
}
function cardBorder(status) {
  return status==="good"
    ? "border-emerald-500/25 bg-emerald-500/5"
    : status==="warning"
    ? "border-amber-500/25 bg-amber-500/5"
    : "border-red-500/30 bg-red-500/5";
}

function calcStatus(ctr, cpl, cpp, leads, purchases, spendVal, t) {
  if (spendVal > 0 && leads === 0 && purchases === 0) return "critical";
  if (ctr < t.minCTR * 0.5) return "critical";
  if ((cpl > t.maxCPL * 1.5 && leads > 0) || (cpp > t.maxCPP * 1.5 && purchases > 0)) return "critical";
  if (ctr < t.minCTR) return "warning";
  if ((cpl > t.maxCPL && leads > 0) || (cpp > t.maxCPP && purchases > 0)) return "warning";
  return "good";
}

function buildClients(rows) {
  const map = {};
  rows.forEach((r, i) => {
    const name = (r.client||"").trim();
    const ch   = (r.channel||"").trim().toLowerCase();
    if (!name || !["google","meta","tiktok"].includes(ch)) return;
    const imp = +r.impressions||0, clk = +r.clicks||0;
    const lds = +r.leads||0, pch = +r.purchases||0;
    const spd = +r.spend||0, db  = +r.daily_budget||0;
    const ctr = imp>0 ? (clk/imp)*100 : 0;
    const cpm = imp>0 ? (spd/imp)*1000 : 0;
    const cpc = clk>0 ? spd/clk : 0;
    const cpl = lds>0 ? spd/lds : 0;
    const cpp = pch>0 ? spd/pch : 0;
    if (!map[name]) map[name] = [];
    map[name].push({ id:`${name}-${i}`, adName:r.ad_name||"Bez názvu", channel:ch,
      impressions:imp, clicks:clk, leads:lds, purchases:pch,
      spend:spd, daily_budget:db, ctr, cpm, cpc, cpl, cpp });
  });

  return Object.entries(map).map(([name, cams]) => {
    const totalSpend  = cams.reduce((s,c)=>s+c.spend,0);
    const totalLeads  = cams.reduce((s,c)=>s+c.leads,0);
    const totalPurch  = cams.reduce((s,c)=>s+c.purchases,0);
    const totalImp    = cams.reduce((s,c)=>s+c.impressions,0);
    const totalClk    = cams.reduce((s,c)=>s+c.clicks,0);
    const totalBudget = cams.reduce((s,c)=>s+c.daily_budget,0);
    const avgCTR = totalImp>0 ? (totalClk/totalImp)*100 : 0;
    const avgCPM = totalImp>0 ? (totalSpend/totalImp)*1000 : 0;
    const avgCPC = totalClk>0 ? totalSpend/totalClk : 0;
    const avgCPL = totalLeads>0 ? totalSpend/totalLeads : 0;
    const avgCPP = totalPurch>0 ? totalSpend/totalPurch : 0;

    // per channel
    const chMap = {};
    cams.forEach(c => { if(!chMap[c.channel]) chMap[c.channel]=[]; chMap[c.channel].push(c); });
    const channels = Object.entries(chMap).map(([ch, cs]) => {
      const s=cs.reduce((a,c)=>a+c.spend,0), im=cs.reduce((a,c)=>a+c.impressions,0);
      const cl=cs.reduce((a,c)=>a+c.clicks,0), ld=cs.reduce((a,c)=>a+c.leads,0);
      const pu=cs.reduce((a,c)=>a+c.purchases,0), db=cs.reduce((a,c)=>a+c.daily_budget,0);
      const ctr=im>0?(cl/im)*100:0, cpm=im>0?(s/im)*1000:0;
      const cpc=cl>0?s/cl:0, cpl=ld>0?s/ld:0, cpp=pu>0?s/pu:0;
      const chStatus = calcStatus(ctr,cpl,cpp,ld,pu,s,THRESHOLDS);
      return { channel:ch, spend:s, impressions:im, clicks:cl, leads:ld, purchases:pu,
               daily_budget:db, ctr, cpm, cpc, cpl, cpp, status:chStatus, campaigns:cs };
    });

    const reasons = [];
    if (avgCTR < THRESHOLDS.minCTR)
      reasons.push(`Nízké CTR (${n(avgCTR,2)}% < ${THRESHOLDS.minCTR}%)`);
    if (avgCPL > THRESHOLDS.maxCPL && totalLeads > 0)
      reasons.push(`Vysoké CPL (${kc(avgCPL)} > ${kc(THRESHOLDS.maxCPL)})`);
    if (avgCPP > THRESHOLDS.maxCPP && totalPurch > 0)
      reasons.push(`Vysoké CPP (${kc(avgCPP)} > ${kc(THRESHOLDS.maxCPP)})`);
    if (totalLeads===0 && totalPurch===0 && totalSpend>0)
      reasons.push("Žádné konverze při aktivním spend");

    const status = calcStatus(avgCTR,avgCPL,avgCPP,totalLeads,totalPurch,totalSpend,THRESHOLDS);
    return { id:name, name, campaigns:cams, channels, status, reasons,
             totalSpend, totalLeads, totalPurch, totalBudget,
             avgCTR, avgCPM, avgCPC, avgCPL, avgCPP };
  }).sort((a,b)=>({critical:0,warning:1,good:2}[a.status]-{critical:0,warning:1,good:2}[b.status]));
}

// ─── Channel Spend Chart ───────────────────────────────────────────────────────
function ChannelSpendChart({ clients }) {
  const chTotals = useMemo(() => {
    const t = { google:0, meta:0, tiktok:0 };
    clients.forEach(c => c.channels.forEach(ch => { t[ch.channel] = (t[ch.channel]||0) + ch.spend; }));
    return t;
  }, [clients]);

  const total = Object.values(chTotals).reduce((a,b)=>a+b,0);
  if (total === 0) return null;

  const channels = ["meta","google","tiktok"];

  return (
    <div className="rounded-xl border border-zinc-800 bg-zinc-900/50 p-4 space-y-3">
      <p className="text-[10px] uppercase tracking-wider text-zinc-500 font-medium">Spend podle kanálu</p>
      <div className="space-y-2.5">
        {channels.map(ch => {
          const val = chTotals[ch] || 0;
          const pct = total > 0 ? (val / total) * 100 : 0;
          const cfg = CH[ch];
          return (
            <div key={ch} className="flex items-center gap-3">
              <span className={`text-xs font-semibold w-14 flex-shrink-0 ${cfg.text}`}>{cfg.label}</span>
              <div className="flex-1 h-5 bg-zinc-800 rounded-full overflow-hidden">
                <div
                  className="h-full rounded-full bar-fill"
                  style={{ width:`${pct}%`, background: cfg.bar, opacity: 0.75 }}
                />
              </div>
              <span className="text-xs text-zinc-400 w-20 text-right flex-shrink-0">{spend(val)}</span>
              <span className="text-[10px] text-zinc-600 w-8 text-right flex-shrink-0">{n(pct,0)}%</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Components ───────────────────────────────────────────────────────────────
function Kpi({label, value, status, sub}) {
  return (
    <div className="flex flex-col gap-0.5 min-w-0">
      <span className="text-[10px] uppercase tracking-wider text-zinc-500 font-medium whitespace-nowrap">{label}</span>
      <span className={`text-sm font-bold whitespace-nowrap ${status ? clr(status) : "text-zinc-100"}`}>{value}</span>
      {sub && <span className="text-[10px] text-zinc-600 whitespace-nowrap">{sub}</span>}
    </div>
  );
}

function ChBadge({channel}) {
  const c = CH[channel];
  return (
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold border ${c.bg} ${c.text} ${c.border}`}>
      {c.label}
    </span>
  );
}

function StatusBadge({status}) {
  const cfg = {
    good:     {label:"OK",       cls:"bg-emerald-400/15 text-emerald-400"},
    warning:  {label:"Varování", cls:"bg-amber-400/15 text-amber-400"},
    critical: {label:"Kritické", cls:"bg-red-400/15 text-red-400"},
  }[status];
  return <span className={`text-[10px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded ${cfg.cls}`}>{cfg.label}</span>;
}

function AdTable({campaigns, thresholds}) {
  const hasLeads = campaigns.some(c=>c.leads>0);
  const hasPurch = campaigns.some(c=>c.purchases>0);
  return (
    <div className="rounded-lg overflow-x-auto border border-zinc-800">
      <table className="w-full text-xs min-w-[720px]">
        <thead>
          <tr className="bg-zinc-900 text-zinc-500 uppercase tracking-wider text-[10px]">
            <th className="text-left px-3 py-2 font-medium">Název reklamy</th>
            <th className="text-right px-3 py-2 font-medium">Impr.</th>
            <th className="text-right px-3 py-2 font-medium">CTR</th>
            <th className="text-right px-3 py-2 font-medium">CPM</th>
            <th className="text-right px-3 py-2 font-medium">CPC</th>
            {hasLeads && <th className="text-right px-3 py-2 font-medium">Leads</th>}
            {hasLeads && <th className="text-right px-3 py-2 font-medium">CPL</th>}
            {hasPurch && <th className="text-right px-3 py-2 font-medium">Nákupy</th>}
            {hasPurch && <th className="text-right px-3 py-2 font-medium">CPP</th>}
            <th className="text-right px-3 py-2 font-medium">Spend</th>
            <th className="text-right px-3 py-2 font-medium">Budget/den</th>
          </tr>
        </thead>
        <tbody className="divide-y divide-zinc-800/60">
          {campaigns.map(c => {
            const ctrBad  = c.ctr < thresholds.minCTR;
            const ctrCrit = c.ctr < thresholds.minCTR * 0.5;
            const cplBad  = c.cpl > thresholds.maxCPL && c.leads > 0;
            const cplCrit = c.cpl > thresholds.maxCPL * 1.5 && c.leads > 0;
            const cppBad  = c.cpp > thresholds.maxCPP && c.purchases > 0;
            const cppCrit = c.cpp > thresholds.maxCPP * 1.5 && c.purchases > 0;
            return (
              <tr key={c.id} className="bg-zinc-950/40 hover:bg-zinc-800/20 transition-colors">
                <td className="px-3 py-2.5 text-zinc-300 max-w-[200px]">
                  <span className="block truncate" title={c.adName}>{c.adName}</span>
                </td>
                <td className="px-3 py-2.5 text-right text-zinc-400">{c.impressions.toLocaleString("cs-CZ")}</td>
                <td className={`px-3 py-2.5 text-right font-medium ${ctrCrit?"text-red-400":ctrBad?"text-amber-400":"text-zinc-300"}`}>
                  {n(c.ctr,2)}%
                </td>
                <td className="px-3 py-2.5 text-right text-zinc-400">{kc(c.cpm)}</td>
                <td className="px-3 py-2.5 text-right text-zinc-400">{c.clicks>0?kc(c.cpc):"—"}</td>
                {hasLeads && <td className="px-3 py-2.5 text-right text-zinc-400">{c.leads||"—"}</td>}
                {hasLeads && <td className={`px-3 py-2.5 text-right font-medium ${cplCrit?"text-red-400":cplBad?"text-amber-400":c.leads>0?"text-zinc-300":"text-zinc-700"}`}>{c.leads>0?kc(c.cpl):"—"}</td>}
                {hasPurch && <td className="px-3 py-2.5 text-right text-zinc-400">{c.purchases||"—"}</td>}
                {hasPurch && <td className={`px-3 py-2.5 text-right font-medium ${cppCrit?"text-red-400":cppBad?"text-amber-400":c.purchases>0?"text-zinc-300":"text-zinc-700"}`}>{c.purchases>0?kc(c.cpp):"—"}</td>}
                <td className="px-3 py-2.5 text-right text-zinc-400">{spend(c.spend)}</td>
                <td className="px-3 py-2.5 text-right text-zinc-500">{c.daily_budget>0?spend(c.daily_budget):"—"}</td>
              </tr>
            );
          })}
        </tbody>
        {campaigns.length > 1 && (() => {
          const ts = campaigns.reduce((a,c)=>a+c.spend,0);
          const ti = campaigns.reduce((a,c)=>a+c.impressions,0);
          const tc = campaigns.reduce((a,c)=>a+c.clicks,0);
          const tl = campaigns.reduce((a,c)=>a+c.leads,0);
          const tp = campaigns.reduce((a,c)=>a+c.purchases,0);
          const tb = campaigns.reduce((a,c)=>a+c.daily_budget,0);
          const tctr = ti>0?(tc/ti)*100:0;
          const tcpm = ti>0?(ts/ti)*1000:0;
          const tcpc = tc>0?ts/tc:0;
          const tcpl = tl>0?ts/tl:0;
          const tcpp = tp>0?ts/tp:0;
          return (
            <tfoot>
              <tr className="bg-zinc-900/80 text-zinc-300 font-semibold border-t border-zinc-700/50">
                <td className="px-3 py-2 text-zinc-500 text-[10px] uppercase tracking-wider">Celkem</td>
                <td className="px-3 py-2 text-right">{ti.toLocaleString("cs-CZ")}</td>
                <td className={`px-3 py-2 text-right ${tctr<1.5?"text-amber-400":"text-zinc-300"}`}>{n(tctr,2)}%</td>
                <td className="px-3 py-2 text-right">{kc(tcpm)}</td>
                <td className="px-3 py-2 text-right">{tc>0?kc(tcpc):"—"}</td>
                {hasLeads && <td className="px-3 py-2 text-right">{tl||"—"}</td>}
                {hasLeads && <td className="px-3 py-2 text-right">{tl>0?kc(tcpl):"—"}</td>}
                {hasPurch && <td className="px-3 py-2 text-right">{tp||"—"}</td>}
                {hasPurch && <td className="px-3 py-2 text-right">{tp>0?kc(tcpp):"—"}</td>}
                <td className="px-3 py-2 text-right">{spend(ts)}</td>
                <td className="px-3 py-2 text-right">{spend(tb)}</td>
              </tr>
            </tfoot>
          );
        })()}
      </table>
    </div>
  );
}

function ChannelSection({ch, thresholds}) {
  const cfg = CH[ch.channel];
  return (
    <div className="space-y-2.5">
      {/* Channel header */}
      <div className="flex items-center gap-2 flex-wrap">
        <span className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold border ${cfg.bg} ${cfg.text} ${cfg.border}`}>
          {ch.channel[0].toUpperCase()}
        </span>
        <span className="font-semibold text-zinc-200 capitalize">{cfg.label}</span>
        <span className={`w-2 h-2 rounded-full flex-shrink-0 ${dot(ch.status)}`} />
        <div className="flex gap-4 ml-auto flex-wrap justify-end">
          <Kpi label="Spend"      value={spend(ch.spend)} />
          <Kpi label="Budget/den" value={spend(ch.daily_budget)} />
          <Kpi label="Impr."      value={ch.impressions.toLocaleString("cs-CZ")} />
          <Kpi label="CTR"        value={`${n(ch.ctr,2)}%`}
               status={ch.ctr<thresholds.minCTR?(ch.ctr<thresholds.minCTR*0.5?"critical":"warning"):"good"} />
          <Kpi label="CPM"        value={kc(ch.cpm)} />
          <Kpi label="CPC"        value={ch.clicks>0?kc(ch.cpc):"—"} />
          {ch.leads>0   && <Kpi label="CPL" value={kc(ch.cpl)} sub={`${ch.leads} leadů`}
               status={ch.cpl>thresholds.maxCPL?(ch.cpl>thresholds.maxCPL*1.5?"critical":"warning"):"good"} />}
          {ch.purchases>0 && <Kpi label="CPP" value={kc(ch.cpp)} sub={`${ch.purchases} nákupů`}
               status={ch.cpp>thresholds.maxCPP?(ch.cpp>thresholds.maxCPP*1.5?"critical":"warning"):"good"} />}
        </div>
      </div>
      {/* Ad table */}
      <AdTable campaigns={ch.campaigns} thresholds={thresholds} />
    </div>
  );
}

function ClientCard({client, channelFilter}) {
  const [open, setOpen] = useState(false);

  const visibleChannels = channelFilter === "all"
    ? client.channels
    : client.channels.filter(ch => ch.channel === channelFilter);

  if (channelFilter !== "all" && visibleChannels.length === 0) return null;

  return (
    <div className={`rounded-xl border transition-all duration-200 ${cardBorder(client.status)}`}>
      {/* Summary row */}
      <button onClick={()=>setOpen(!open)} className="w-full text-left p-4 flex items-start gap-3">
        <div className="flex-shrink-0 mt-1.5">
          <span className={`block w-2.5 h-2.5 rounded-full ${dot(client.status)}`} />
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <h3 className="font-bold text-zinc-100 text-base leading-tight">{client.name}</h3>
            <StatusBadge status={client.status} />
          </div>
          <div className="flex gap-1.5 mt-1.5 flex-wrap">
            {client.channels.map(ch => <ChBadge key={ch.channel} channel={ch.channel} />)}
          </div>
          {client.reasons.length > 0 && (
            <div className="mt-1.5 flex flex-wrap gap-x-3 gap-y-0.5">
              {client.reasons.map((r,i) => (
                <span key={i} className="text-[11px] text-zinc-500">• {r}</span>
              ))}
            </div>
          )}
        </div>
        {/* KPIs */}
        <div className="hidden lg:flex gap-5 flex-shrink-0 items-start">
          <Kpi label="Spend"      value={spend(client.totalSpend)} />
          <Kpi label="Budget/den" value={spend(client.totalBudget)} />
          <Kpi label="CTR"        value={`${n(client.avgCTR,2)}%`}
               status={client.avgCTR<THRESHOLDS.minCTR?(client.avgCTR<THRESHOLDS.minCTR*0.5?"critical":"warning"):"good"} />
          <Kpi label="CPM"        value={kc(client.avgCPM)} />
          <Kpi label="CPC"        value={kc(client.avgCPC)} />
          {client.totalLeads>0 && <Kpi label="CPL" value={kc(client.avgCPL)}
               status={client.avgCPL>THRESHOLDS.maxCPL?(client.avgCPL>THRESHOLDS.maxCPL*1.5?"critical":"warning"):"good"}
               sub={`${client.totalLeads} leadů`} />}
          {client.totalPurch>0 && <Kpi label="CPP" value={kc(client.avgCPP)}
               status={client.avgCPP>THRESHOLDS.maxCPP?(client.avgCPP>THRESHOLDS.maxCPP*1.5?"critical":"warning"):"good"}
               sub={`${client.totalPurch} nákupů`} />}
        </div>
        <span className={`flex-shrink-0 text-zinc-500 mt-1 transition-transform duration-200 text-lg ${open?"rotate-180":""}`}>⌄</span>
      </button>

      {/* Mobile KPIs */}
      <div className="lg:hidden px-4 pb-3 flex flex-wrap gap-4">
        <Kpi label="Spend"  value={spend(client.totalSpend)} />
        <Kpi label="CTR"    value={`${n(client.avgCTR,2)}%`}
             status={client.avgCTR<THRESHOLDS.minCTR?"warning":"good"} />
        <Kpi label="CPC"    value={kc(client.avgCPC)} />
        <Kpi label="CPM"    value={kc(client.avgCPM)} />
        {client.totalLeads>0   && <Kpi label="CPL" value={kc(client.avgCPL)} sub={`${client.totalLeads} leadů`} />}
        {client.totalPurch>0   && <Kpi label="CPP" value={kc(client.avgCPP)} sub={`${client.totalPurch} nákupů`} />}
      </div>

      {/* Expanded detail */}
      {open && (
        <div className="border-t border-zinc-700/40 fade-in">
          <div className="divide-y divide-zinc-800/50">
            {visibleChannels.map(ch => (
              <div key={ch.channel} className="p-4">
                <ChannelSection ch={ch} thresholds={THRESHOLDS} />
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function AttentionPanel({clients}) {
  const bad = clients.filter(c=>c.status!=="good");
  if (bad.length===0) return (
    <div className="rounded-xl border border-emerald-500/25 bg-emerald-500/5 p-4 flex items-center gap-3">
      <span className="text-2xl">✅</span>
      <div>
        <p className="text-emerald-400 font-semibold">Všichni klienti jsou v pohodě</p>
        <p className="text-zinc-500 text-sm">Žádné kampaně nevyžadují okamžitou pozornost.</p>
      </div>
    </div>
  );
  return (
    <div className="space-y-3">
      <div className="flex items-center gap-2">
        <span className="text-base font-bold text-zinc-100">🚨 Potřebuje pozornost</span>
        <span className="ml-auto text-xs text-zinc-500">{bad.length} klientů</span>
      </div>
      <div className="grid gap-2 sm:grid-cols-2 lg:grid-cols-3">
        {[...bad.filter(c=>c.status==="critical"), ...bad.filter(c=>c.status==="warning")].map(c => (
          <div key={c.id} className={`rounded-lg border p-3 ${c.status==="critical"?"border-red-500/40 bg-red-500/8":"border-amber-500/30 bg-amber-500/5"}`}>
            <div className="flex items-start justify-between gap-2 mb-2">
              <span className="font-semibold text-zinc-100 text-sm">{c.name}</span>
              <span className={`text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0 ${c.status==="critical"?"bg-red-500/20 text-red-400":"bg-amber-500/20 text-amber-400"}`}>
                {c.status==="critical"?"KRITICKÉ":"VAROVÁNÍ"}
              </span>
            </div>
            <ul className="space-y-0.5">
              {c.reasons.map((r,i) => (
                <li key={i} className="text-xs text-zinc-400 flex items-start gap-1.5">
                  <span className={c.status==="critical"?"text-red-400":"text-amber-400"}>•</span>{r}
                </li>
              ))}
            </ul>
            <div className="mt-2 pt-2 border-t border-zinc-700/50 flex gap-3 text-xs text-zinc-500">
              <span>Spend: <strong className="text-zinc-400">{spend(c.totalSpend)}</strong></span>
              <span>CTR: <strong className="text-zinc-400">{n(c.avgCTR,2)}%</strong></span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CsvImport({onImport}) {
  const [drag, setDrag] = useState(false);
  const [err, setErr]   = useState(null);
  const ref = useRef();

  const template = `client,channel,ad_name,impressions,clicks,leads,purchases,spend,daily_budget\nMůj Klient,google,Reklama Google,10000,300,25,10,2500,400\nMůj Klient,meta,Reklama Meta,45000,1350,80,0,3200,500\nMůj Klient,tiktok,TikTok video,90000,2700,30,5,1800,280`;

  function parse(file) {
    setErr(null);
    Papa.parse(file, {
      header:true, skipEmptyLines:true,
      complete(res) {
        const required=["client","channel","ad_name","impressions","clicks","leads","purchases","spend","daily_budget"];
        const miss=required.filter(r=>!res.meta.fields?.includes(r));
        if (miss.length) { setErr("Chybějící sloupce: "+miss.join(", ")); return; }
        onImport(res.data);
      }
    });
  }

  return (
    <div className="space-y-3">
      <div
        onDragOver={e=>{e.preventDefault();setDrag(true)}}
        onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);parse(e.dataTransfer.files[0])}}
        onClick={()=>ref.current.click()}
        className={`border-2 border-dashed rounded-xl p-6 text-center cursor-pointer transition-colors ${drag?"border-blue-500 bg-blue-500/10":"border-zinc-700 hover:border-zinc-500 bg-zinc-900/40"}`}
      >
        <input ref={ref} type="file" accept=".csv" className="hidden"
          onChange={e=>{ if(e.target.files[0]) parse(e.target.files[0]); }} />
        <p className="text-sm text-zinc-400"><span className="text-zinc-200 font-semibold">Přetáhni CSV sem</span> nebo klikni pro výběr</p>
        <p className="text-xs text-zinc-600 mt-1">client · channel · ad_name · impressions · clicks · leads · purchases · spend · daily_budget</p>
      </div>
      {err && <div className="rounded-lg bg-red-500/10 border border-red-500/30 p-3 text-sm text-red-400">{err}</div>}
      <button onClick={()=>{
        const a=document.createElement("a");
        a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(template);
        a.download="marketing_sablona.csv"; a.click();
      }} className="text-xs text-zinc-500 hover:text-zinc-300 underline transition-colors">
        Stáhnout CSV šablonu
      </button>
    </div>
  );
}

// ─── Sort options ─────────────────────────────────────────────────────────────
const SORT_OPTIONS = [
  { id:"status",  label:"Status" },
  { id:"spend",   label:"Spend ↓" },
  { id:"ctr",     label:"CTR ↑" },
  { id:"name",    label:"Název" },
];

function sortClients(clients, sortBy) {
  return [...clients].sort((a, b) => {
    if (sortBy === "status") {
      return ({critical:0,warning:1,good:2}[a.status] - {critical:0,warning:1,good:2}[b.status]);
    }
    if (sortBy === "spend")  return b.totalSpend - a.totalSpend;
    if (sortBy === "ctr")    return a.avgCTR - b.avgCTR;   // ascending — worst first
    if (sortBy === "name")   return a.name.localeCompare(b.name, "cs");
    return 0;
  });
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard() {
  const [clients, setClients]       = useState([]);
  const [view, setView]             = useState("all");
  const [channelFilter, setChannel] = useState("all");
  const [search, setSearch]         = useState("");
  const [sortBy, setSortBy]         = useState("status");
  const [showImport, setShow]       = useState(false);
  const [updated, setUpdated]       = useState("");

  function load(rows) {
    setClients(buildClients(rows));
    setUpdated(new Date().toLocaleString("cs-CZ"));
    setShow(false);
  }

  useEffect(()=>{ load(MOCK_ROWS); }, []);

  const now = new Date();
  const from = new Date(now); from.setDate(from.getDate()-7);
  const dateRange = `${from.toLocaleDateString("cs-CZ")} – ${now.toLocaleDateString("cs-CZ")}`;

  const filtered = useMemo(() => {
    const base = clients.filter(c => {
      if (view !== "all" && c.status !== view) return false;
      if (search && !c.name.toLowerCase().includes(search.toLowerCase())) return false;
      if (channelFilter !== "all" && !c.channels.some(ch => ch.channel === channelFilter)) return false;
      return true;
    });
    return sortClients(base, sortBy);
  }, [clients, view, search, channelFilter, sortBy]);

  const counts = {
    all:      clients.length,
    critical: clients.filter(c=>c.status==="critical").length,
    warning:  clients.filter(c=>c.status==="warning").length,
    good:     clients.filter(c=>c.status==="good").length,
  };

  const totalSpend  = clients.reduce((s,c)=>s+c.totalSpend,0);
  const totalBudget = clients.reduce((s,c)=>s+c.totalBudget,0);

  const statusBtns = [
    { id:"all",      label:"Všichni",     count:counts.all,      cls:"bg-zinc-700 border-zinc-600 text-zinc-200",            inact:"bg-zinc-900 border-zinc-700 text-zinc-500 hover:text-zinc-300" },
    { id:"critical", label:"🔴 Kritické", count:counts.critical, cls:"bg-red-500/20 border-red-500/40 text-red-400",         inact:"bg-zinc-900 border-zinc-700 text-zinc-500 hover:text-zinc-300" },
    { id:"warning",  label:"🟡 Varování", count:counts.warning,  cls:"bg-amber-500/20 border-amber-500/40 text-amber-400",   inact:"bg-zinc-900 border-zinc-700 text-zinc-500 hover:text-zinc-300" },
    { id:"good",     label:"🟢 OK",       count:counts.good,     cls:"bg-emerald-500/20 border-emerald-500/40 text-emerald-400", inact:"bg-zinc-900 border-zinc-700 text-zinc-500 hover:text-zinc-300" },
  ];

  const channelBtns = [
    { id:"all",    label:"Všechny kanály" },
    { id:"meta",   label:"Meta" },
    { id:"google", label:"Google" },
    { id:"tiktok", label:"TikTok" },
  ];

  return (
    <div className="min-h-screen" style={{background:"#09090b"}}>
      {/* Header */}
      <header className="border-b border-zinc-800 sticky top-0 z-10" style={{background:"rgba(9,9,11,0.92)",backdropFilter:"blur(12px)"}}>
        <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-4 flex-wrap">
          <div>
            <h1 className="font-bold text-zinc-100 text-lg leading-tight">📊 Marketing Dashboard</h1>
            <p className="text-[11px] text-zinc-500">{dateRange} · Posledních 7 dní</p>
          </div>
          <div className="flex items-center gap-3 flex-wrap">
            <div className="hidden sm:flex items-center gap-4 text-xs text-zinc-500 pr-3 border-r border-zinc-800">
              <span>Spend: <strong className="text-zinc-300">{spend(totalSpend)}</strong></span>
              <span>Budget/den: <strong className="text-zinc-300">{spend(totalBudget)}</strong></span>
              <span><strong className="text-zinc-300">{clients.length}</strong> klientů</span>
            </div>
            <button onClick={()=>setShow(!showImport)}
              className="text-xs px-3 py-1.5 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-300 border border-zinc-700 transition-colors">
              {showImport?"✕ Zavřít":"📂 Import CSV"}
            </button>
            <button onClick={()=>load(MOCK_ROWS)}
              className="text-xs px-3 py-1.5 rounded-lg bg-blue-600/20 hover:bg-blue-600/30 text-blue-400 border border-blue-600/30 transition-colors">
              Demo data
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-6xl mx-auto px-4 py-6 space-y-6">
        {/* CSV Import */}
        {showImport && (
          <div className="rounded-xl border border-zinc-700 bg-zinc-900 p-4 fade-in">
            <p className="text-sm font-semibold text-zinc-300 mb-3">Import dat z CSV</p>
            <CsvImport onImport={load} />
          </div>
        )}

        {/* Attention panel */}
        <AttentionPanel clients={clients} />

        {/* Stats summary + channel chart */}
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-3">
          <div className="lg:col-span-2 grid grid-cols-2 sm:grid-cols-4 gap-3">
            {[
              { label:"Celkový spend",    value:spend(totalSpend) },
              { label:"Celkový budget/den", value:spend(totalBudget) },
              { label:"Kritické kampaně", value:String(counts.critical), bad:counts.critical>0 },
              { label:"Klienti v pohodě", value:`${counts.good} / ${counts.all}` },
            ].map(s => (
              <div key={s.label} className="rounded-lg border border-zinc-800 bg-zinc-900/50 p-3">
                <p className="text-[10px] uppercase tracking-wider text-zinc-500 font-medium">{s.label}</p>
                <p className={`text-lg font-bold mt-0.5 ${s.bad?"text-red-400":"text-zinc-100"}`}>{s.value}</p>
              </div>
            ))}
          </div>
          <ChannelSpendChart clients={clients} />
        </div>

        {/* Filter bar */}
        <div className="space-y-2">
          {/* Row 1: search + status filter */}
          <div className="flex items-center gap-2 flex-wrap">
            <div className="relative flex-1 min-w-36 max-w-xs">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 text-xs">🔍</span>
              <input type="text" placeholder="Hledat klienta..." value={search}
                onChange={e=>setSearch(e.target.value)}
                className="w-full pl-7 pr-3 py-1.5 text-sm rounded-lg bg-zinc-900 border border-zinc-700 text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-zinc-500" />
            </div>
            <div className="flex gap-1.5 ml-auto flex-wrap">
              {statusBtns.map(b => (
                <button key={b.id} onClick={()=>setView(b.id)}
                  className={`text-xs px-2.5 py-1 rounded-lg border transition-colors ${view===b.id?b.cls:b.inact}`}>
                  {b.label} <span className="opacity-60">({b.count})</span>
                </button>
              ))}
            </div>
          </div>

          {/* Row 2: channel filter + sort */}
          <div className="flex items-center gap-2 flex-wrap">
            <div className="flex gap-1.5 flex-wrap">
              {channelBtns.map(b => {
                const active = channelFilter === b.id;
                const chCfg = b.id !== "all" ? CH[b.id] : null;
                const activeCls = chCfg
                  ? `${chCfg.bg} ${chCfg.border} ${chCfg.text}`
                  : "bg-zinc-700 border-zinc-600 text-zinc-200";
                return (
                  <button key={b.id} onClick={()=>setChannel(b.id)}
                    className={`text-xs px-2.5 py-1 rounded-lg border transition-colors ${active?activeCls:"bg-zinc-900 border-zinc-700 text-zinc-500 hover:text-zinc-300"}`}>
                    {b.label}
                  </button>
                );
              })}
            </div>
            <div className="flex items-center gap-1.5 ml-auto flex-wrap">
              <span className="text-[10px] uppercase tracking-wider text-zinc-600 font-medium">Řadit:</span>
              {SORT_OPTIONS.map(s => (
                <button key={s.id} onClick={()=>setSortBy(s.id)}
                  className={`text-xs px-2.5 py-1 rounded-lg border transition-colors ${sortBy===s.id?"bg-zinc-700 border-zinc-600 text-zinc-200":"bg-zinc-900 border-zinc-700 text-zinc-500 hover:text-zinc-300"}`}>
                  {s.label}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Client list */}
        {filtered.length===0
          ? <div className="text-center py-12 text-zinc-600">Žádní klienti neodpovídají filtru.</div>
          : <div className="space-y-3">
              {filtered.map(c => (
                <ClientCard key={c.id} client={c} channelFilter={channelFilter} />
              ))}
            </div>
        }

        <footer className="text-center text-xs text-zinc-700 pt-2">
          {updated ? `Aktualizováno: ${updated}` : ""}
        </footer>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
